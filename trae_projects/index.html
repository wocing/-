<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然风景展览</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <nav>
            <div class="logo">自然风景</div>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="#home">首页</a></li>
                    <li><a href="#gallery">画廊</a></li>
                    <li><a href="#about">关于</a></li>
                    <li><a href="#contact">联系</a></li>
                </ul>
                <button id="theme-toggle" class="theme-toggle">
                    <span class="light-icon">☀️</span>
                    <span class="dark-icon">🌙</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- 首页横幅 -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>自然的魅力</h1>
            <p>探索大自然的壮丽景观</p>
            <a href="#gallery" class="btn">浏览画廊</a>
        </div>
    </section>

    <!-- 图片画廊 -->
    <section id="gallery" class="gallery">
        <div class="container">
            <h2>风景画廊</h2>
            
            <!-- 分类筛选 -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="mountain">山脉</button>
                <button class="filter-btn" data-filter="ocean">海洋</button>
                <button class="filter-btn" data-filter="forest">森林</button>
                <button class="filter-btn" data-filter="desert">沙漠</button>
            </div>

            <!-- 加载状态 -->
            <div id="loading" class="loading">正在加载图片...</div>
            
            <!-- 图片网格 - 动态从Supabase加载 -->
            <div class="gallery-grid" id="gallery-grid">
                <!-- 图片将通过JavaScript动态加载 -->
            </div>
        </div>
    </section>

    <!-- 关于部分 -->
    <section id="about" class="about">
        <div class="container">
            <h2>关于我们</h2>
            <p>我们致力于展示大自然的美丽与多样性，通过高质量的风景摄影作品，让人们感受到大自然的魅力与力量。我们相信，自然风景不仅是视觉的享受，更是心灵的寄托。</p>
        </div>
    </section>

    <!-- 联系部分 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>联系我们</h2>
            <p>如果您有任何问题或建议，欢迎与我们联系。</p>
            <form class="contact-form">
                <input type="text" placeholder="您的姓名" required>
                <input type="email" placeholder="您的邮箱" required>
                <textarea placeholder="您的留言" required></textarea>
                <button type="submit" class="btn">发送留言</button>
            </form>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 自然风景展览. 保留所有权利.</p>
        </div>
    </footer>

    <!-- AI推荐部分 -->
    <section id="ai-recommendations-section" class="ai-recommendations">
        <div class="container">
            <h2>AI推荐</h2>
            <div id="ai-recommendations" class="ai-recommendations-container">
                <!-- AI推荐将通过JavaScript动态加载 -->
            </div>
        </div>
    </section>

    <!-- 图片查看模态框 -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
        <div id="caption"></div>
    </div>

    <script src="config.js"></script>
    <script src="supabase.js"></script>
    <script src="recommendation.js"></script>
    <script src="ai-recommendation.js"></script>
    <script src="script.js"></script>
</body>
</html>
